<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 多益文法特訓王Pro</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --background-color: #f1f5f9;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            padding: 10px 20px; border: none; background-color: #e2e8f0;
            color: #4a5568; border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        .tab-btn.active { background-color: var(--primary-color); color: white; }

        .container {
            width: 100%; max-width: 550px; min-height: 480px; background: white;
            padding: 30px; border-radius: 16px; box-shadow: var(--card-shadow);
            box-sizing: border-box; display: flex; flex-direction: column;
        }

        .panel { display: none; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .panel.active { display: flex; }

        /* 文法卡外框 */
        .flashcard {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white; 
            min-height: 400px; 
            border-radius: 12px;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            text-align: center;
            padding: 55px 25px 20px 25px; 
            box-sizing: border-box; 
            position: relative;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* 最愛按鈕 */
        .fav-btn {
            position: absolute; background: rgba(255,255,255,0.1); border: none;
            color: white; font-size: 1.6rem; cursor: pointer; padding: 0; border-radius: 50%;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; top: 15px; right: 15px; z-index: 10;
        }
        .fav-btn:hover { background: rgba(255,255,255,0.3); }

        /* 外接工具列 (語音與翻譯) */
        .tool-bar {
            position: absolute; top: 15px; left: 100px; display: flex; gap: 8px; z-index: 10;
        }
        .tool-btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 6px; padding: 4px 10px; font-size: 0.85rem;
            cursor: pointer; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.4); }

        /* 文法分類標籤 */
        .grammar-badge {
            position: absolute; top: 22px; left: 20px; background: rgba(0,0,0,0.25);
            padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold;
            letter-spacing: 0.5px;
        }

        .card-main-content {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            flex-grow: 1; width: 100%;
        }

        /* 文法題目與排版 */
        #card-front-area { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .grammar-question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.6; margin: 0; text-align: left; }
        
        /* 正面選項預覽 */
        .card-options-preview {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; text-align: left; margin-top: 5px;
        }
        .card-opt-item {
            background: rgba(255, 255, 255, 0.1); padding: 10px 12px; border-radius: 6px; font-size: 0.95rem;
            transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .card-opt-item.correct-ans {
            background: rgba(255, 255, 255, 0.25); color: #ffffff; font-weight: bold; border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-opt-item.wrong-ans { opacity: 0.45; }

        /* 背面詳解樣式 */
        #card-back-area { width: 100%; text-align: center; }
        .ans-title { font-size: 0.85rem; opacity: 0.7; font-weight: bold; margin-bottom: 2px; }
        .word-back-en { font-size: 1.8rem; font-weight: bold; letter-spacing: 0.5px; margin: 0 0 10px 0; color: #fff; }
        .grammar-explain { 
            font-size: 0.95rem; opacity: 0.95; line-height: 1.6; margin: 0; 
            background: rgba(0,0,0,0.15); padding: 14px; border-radius: 8px; 
            text-align: left; word-break: break-word;
        }

        .click-hint { 
            font-size: 0.8rem; opacity: 0.6; animation: pulse 2s infinite; margin-top: 20px; user-select: none;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }

        /* 測驗面排版與內嵌工具 */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .quiz-tools { display: flex; gap: 6px; }
        .quiz-tool-btn {
            background: #e2e8f0; border: none; color: #4a5568; padding: 4px 8px; font-size: 0.8rem;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .quiz-tool-btn:hover { background: #cbd5e1; color: var(--primary-color); }

        .quiz-word { font-size: 1.2rem; font-weight: 600; line-height: 1.6; text-align: left; margin: 10px 0 20px 0; color: #1e293b; }
        .options-grid { display: grid; gap: 12px; }
        .option-btn {
            padding: 14px; border: 2px solid #e2e8f0; background: white;
            border-radius: 8px; cursor: pointer; font-size: 1rem; text-align: left;
            font-weight: 500; color: #334155;
        }
        
        .quiz-hint-btn {
            background: none; border: 1px dashed #94a3b8; color: #64748b;
            padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer;
            margin-top: 15px; font-weight: 500; transition: all 0.2s; align-self: center;
        }
        .quiz-hint-btn:hover { background: #f1f5f9; color: var(--primary-color); border-color: var(--primary-color); }
        .quiz-hint-box {
            display: none; background: #f8fafc; border-left: 3px solid var(--primary-color);
            padding: 12px; border-radius: 6px; font-size: 0.95rem; color: #334155;
            margin-top: 10px; line-height: 1.5; text-align: left;
        }
        
        .ctrl-btns { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .action-btn {
            padding: 12px 24px; border: none; background-color: var(--secondary-color);
            color: white; border-radius: 8px; cursor: pointer; font-weight: bold; flex-grow: 1;
            text-align: center;
        }
        #feedback { text-align: center; font-weight: bold; margin-top: 15px; font-size: 1.1rem; min-height: 24px; }

        /* 錯題本列表工具列 */
        .fav-item-tools { display: flex; gap: 8px; margin-top: 4px; }
        .fav-tool-btn {
            background: #f1f5f9; border: 1px solid #cbd5e1; color: #64748b; padding: 2px 8px;
            font-size: 0.75rem; border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .fav-tool-btn:hover { background: #e2e8f0; color: var(--primary-color); }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: #1e293b; margin-bottom: 5px;">TOEIC 多益文法特訓王</h2>
        <p style="color: #64748b; margin: 0; font-size: 0.9rem;">點擊文法卡片即可翻面看核心詳解</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('card-panel')">文法翻卡</button>
        <button class="tab-btn" onclick="switchTab('quiz-panel')">文法四選一</button>
        <button class="tab-btn" onclick="switchTab('fav-panel')">錯題本 (<span id="fav-count">0</span>)</button>
    </div>

    <div class="container">
        <div id="card-panel" class="panel active">
            <div class="flashcard" onclick="flipCard()">
                <div class="grammar-badge" id="card-badge">考點</div>
                
                <div class="tool-bar">
                    <button class="tool-btn" id="card-speech-btn" onclick="triggerSpeech(event, 'card')">🔊 發音</button>
                    <button class="tool-btn" id="card-trans-btn" onclick="triggerTranslate(event, 'card')">🌐 翻譯</button>
                </div>

                <button class="fav-btn" id="card-fav-toggle" onclick="toggleFavorite(event)">🤍</button>
                
                <div class="card-main-content">
                    <div id="card-front-area">
                        <p class="grammar-question-text" id="card-question-text">載入中...</p>
                        <div class="card-options-preview" id="card-options-preview"></div>
                    </div>
                    
                    <div id="card-back-area" style="display:none;">
                        <div class="ans-title">CORRECT ANSWER</div>
                        <div class="word-back-en" id="card-back-ans"></div>
                        <div class="grammar-explain" id="card-explain"></div>
                    </div>
                </div>

                <span class="click-hint">點擊卡片翻面</span>
            </div>
            
            <div class="ctrl-btns">
                <button class="action-btn" style="background-color: #64748b;" onclick="prevQuestion()">上一個</button>
                <button class="action-btn" onclick="nextQuestion()">下一個 (隨機)</button>
            </div>
        </div>

        <div id="quiz-panel" class="panel">
            <div class="quiz-header">
                <div id="quiz-badge" style="font-size:0.8rem; background:#e2e8f0; color:#4a5568; padding:3px 8px; border-radius:4px; font-weight:bold;">分類</div>
                <div class="quiz-tools">
                    <button class="quiz-tool-btn" onclick="triggerSpeech(event, 'quiz')">🔊 聽完整句</button>
                    <button class="quiz-tool-btn" onclick="triggerTranslate(event, 'quiz')">🌐 翻譯此句</button>
                </div>
            </div>
            <div class="quiz-word" id="quiz-question">Question</div>
            <div class="options-grid" id="quiz-options"></div>
            <div id="feedback"></div>
            
            <button class="quiz-hint-btn" id="quiz-hint-toggle-btn" onclick="toggleQuizHint()">💡 查看文法詳解</button>
            <div class="quiz-hint-box" id="quiz-hint-box"></div>

            <div class="ctrl-btns" style="justify-content: flex-end;">
                <button class="action-btn" onclick="initQuiz()">下一題</button>
            </div>
        </div>

        <div id="fav-panel" class="panel">
            <div id="fav-list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="action-btn" style="background-color: #ef4444; flex-grow: 0;" onclick="clearAllFavorites()">清空錯題本</button>
        </div>
    </div>

    <script>
        let grammarDatabase = [];
        let currentIndex = 0;
        let isFlipped = false;
        let favorites = JSON.parse(localStorage.getItem('toeic_grammar_favs')) || [];
        let currentQuizWord = null;

        let cardHistory = [];
        let historyPointer = -1;

        // 【核心邏輯】動態將題目底線組合為完整英文句子
        function getFullSentence(item) {
            if (!item || !item.q) return "";
            // 將題目中的底線（一條或多條底線）動態替換為正確答案 item.a
            return item.q.replace(/_______+/g, item.a);
        }

        // 全域語音播放控制
        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel(); // 停止上一段正在播放的聲音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // 稍微放慢一點點以聽清多益連音
            window.speechSynthesis.speak(utterance);
        }

        // 翻卡與測驗的語音中繼站
        function triggerSpeech(e, type) {
            if (e) e.stopPropagation(); // 防止翻卡事件被觸發
            let item = null;
            if (type === 'card') item = grammarDatabase[currentIndex];
            if (type === 'quiz') item = currentQuizWord;
            
            if (item) {
                speak(getFullSentence(item));
            }
        }

        // 外接 Google 翻譯官網
        function triggerTranslate(e, type) {
            if (e) e.stopPropagation(); // 防止翻卡事件被觸發
            let item = null;
            if (type === 'card') item = grammarDatabase[currentIndex];
            if (type === 'quiz') item = currentQuizWord;
            
            if (item) {
                const sentence = getFullSentence(item);
                const targetUrl = `https://translate.google.com/?sl=en&tl=zh-TW&text=${encodeURIComponent(sentence)}&op=translate`;
                window.open(targetUrl, '_blank');
            }
        }

        // 錯題本專用的獨立語音/翻譯
        function favSpeak(sentence) { speak(sentence); }
        function favTranslate(sentence) {
            const targetUrl = `https://translate.google.com/?sl=en&tl=zh-TW&text=${encodeURIComponent(sentence)}&op=translate`;
            window.open(targetUrl, '_blank');
        }

        // 頁面初始化載入文法庫
        async function loadGrammar() {
            try {
                const response = await fetch('grammar.json');
                grammarDatabase = await response.json();
                updateFavCount();
                
                if (grammarDatabase.length > 0) {
                    currentIndex = Math.floor(Math.random() * grammarDatabase.length);
                    cardHistory.push(currentIndex);
                    historyPointer = 0;
                }
                updateCard();
            } catch (error) {
                document.getElementById('card-question-text').innerText = "無法載入文法庫，請確認 grammar.json 檔案是否存在。";
                console.error("Error loading JSON:", error);
            }
        }

        function switchTab(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            if(event && event.target) event.target.classList.add('active');
            if(panelId === 'quiz-panel') initQuiz();
            if(panelId === 'fav-panel') renderFavorites();
        }

        function updateFavCount() {
            document.getElementById('fav-count').innerText = favorites.length;
        }

        // --- 文法翻卡邏輯 ---
        function updateCard() {
            if(grammarDatabase.length === 0) return;
            const item = grammarDatabase[currentIndex];
            
            document.getElementById('card-badge').innerText = item.cat || "綜合語法";
            document.getElementById('card-question-text').innerText = item.q;
            
            const previewContainer = document.getElementById('card-options-preview');
            previewContainer.innerHTML = "";
            
            const prefixes = ['A', 'B', 'C', 'D'];
            item.choices.forEach((choice, idx) => {
                const optDiv = document.createElement('div');
                const isCorrect = (choice === item.a);
                
                optDiv.className = `card-opt-item ${isCorrect ? 'correct-ans' : 'wrong-ans'}`;
                optDiv.innerText = `(${prefixes[idx]}) ${choice}`;
                previewContainer.appendChild(optDiv);
            });

            document.getElementById('card-back-ans').innerText = `(${prefixes[item.choices.indexOf(item.a)] || ''}) ${item.a}`;
            document.getElementById('card-explain').innerText = item.explain;
            
            const isFav = favorites.some(fav => fav.id === item.id);
            document.getElementById('card-fav-toggle').innerText = isFav ? "❤️" : "🤍";
            
            document.getElementById('card-front-area').style.display = 'flex';
            document.getElementById('card-back-area').style.display = 'none';
            isFlipped = false;
        }

        function flipCard() {
            const front = document.getElementById('card-front-area');
            const back = document.getElementById('card-back-area');
            if(isFlipped) {
                front.style.display = 'flex';
                back.style.display = 'none';
            } else {
                front.style.display = 'none';
                back.style.display = 'block';
            }
            isFlipped = !isFlipped;
        }

        function nextQuestion() { 
            if (grammarDatabase.length === 0) return;
            if (historyPointer < cardHistory.length - 1) {
                historyPointer++;
                currentIndex = cardHistory[historyPointer];
            } else {
                currentIndex = Math.floor(Math.random() * grammarDatabase.length);
                cardHistory.push(currentIndex);
                historyPointer++;
            }
            updateCard(); 
        }

        function prevQuestion() { 
            if (historyPointer > 0) {
                historyPointer--;
                currentIndex = cardHistory[historyPointer];
                updateCard();
            }
        }

        function toggleFavorite(e) {
            e.stopPropagation(); 
            const currentItem = grammarDatabase[currentIndex];
            const favIndex = favorites.findIndex(fav => fav.id === currentItem.id);
            if (favIndex > -1) {
                favorites.splice(favIndex, 1);
            } else {
                favorites.push(currentItem);
            }
            localStorage.setItem('toeic_grammar_favs', JSON.stringify(favorites));
            updateFavCount();
            updateCard();
        }

        // --- 測驗邏輯 ---
        function initQuiz() {
            if(grammarDatabase.length === 0) return;
            document.getElementById('feedback').innerText = "";
            
            const hintBox = document.getElementById('quiz-hint-box');
            hintBox.style.display = 'none';
            hintBox.innerText = "";
            document.getElementById('quiz-hint-toggle-btn').style.display = 'none'; 
            
            currentQuizWord = grammarDatabase[Math.floor(Math.random() * grammarDatabase.length)];
            document.getElementById('quiz-badge').innerText = `🎯 考點：${currentQuizWord.cat || "綜合"}`;
            document.getElementById('quiz-question').innerText = currentQuizWord.q;

            const optionsGrid = document.getElementById('quiz-options');
            optionsGrid.innerHTML = "";
            
            currentQuizWord.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = choice;
                btn.onclick = () => checkAnswer(btn, choice);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, choice) {
            const feedback = document.getElementById('feedback');
            const hintBtn = document.getElementById('quiz-hint-toggle-btn');
            
            hintBtn.style.display = 'inline-block';
            document.getElementById('quiz-hint-box').innerText = currentQuizWord.explain;

            if(choice === currentQuizWord.a) {
                feedback.innerText = "🎉 回答正確！太強了！";
                feedback.style.color = "#10b981";
                btn.style.backgroundColor = "#d1fae5";
                btn.style.borderColor = "#10b981";
            } else {
                feedback.innerText = "❌ 答錯了！已自動記錄至錯題本。";
                feedback.style.color = "#ef4444";
                btn.style.backgroundColor = "#fee2e2";
                btn.style.borderColor = "#ef4444";
                
                if (!favorites.some(fav => fav.id === currentQuizWord.id)) {
                    favorites.push(currentQuizWord);
                    localStorage.setItem('toeic_grammar_favs', JSON.stringify(favorites));
                    updateFavCount();
                }
            }
        }

        function toggleQuizHint() {
            const hintBox = document.getElementById('quiz-hint-box');
            hintBox.style.display = (hintBox.style.display === 'block') ? 'none' : 'block';
        }

        // --- 錯題本列表 ---
        function renderFavorites() {
            const container = document.getElementById('fav-list-container');
            container.innerHTML = "";
            if(favorites.length === 0) {
                container.innerHTML = "<p style='color:#718096; text-align:center; padding: 20px;'>目前文法錯題本空空如也！</p>";
                return;
            }
            favorites.forEach(item => {
                const div = document.createElement('div');
                div.style = "padding: 14px; border-bottom: 1px solid #e2e8f0; display:flex; flex-direction:column; gap:6px;";
                
                // 動態取得錯題本中合成後的完整句並安全處理單雙引號
                const fullSentence = getFullSentence(item).replace(/'/g, "\\'").replace(/"/g, '&quot;');

                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.75rem; background:#fee2e2; color:#ef4444; padding:2px 6px; border-radius:4px; font-weight:bold;">${item.cat}</span>
                        <div class="fav-item-tools">
                            <button class="fav-tool-btn" onclick="favSpeak('${fullSentence}')">🔊 聽完整句</button>
                            <button class="fav-tool-btn" onclick="favTranslate('${fullSentence}')">🌐 翻譯</button>
                        </div>
                    </div>
                    <div style="color:#1e293b; font-weight:500;">${item.q}</div>
                    <div style="color:#6366f1; font-weight:bold;">正確答案：${item.a}</div>
                    <div style="color:#64748b; font-size:0.85rem; background:#f8fafc; padding:8px; border-radius:4px;">${item.explain}</div>
                `;
                container.appendChild(div);
            });
        }

        function clearAllFavorites() {
            if(confirm("確定要清空所有文法錯題紀錄嗎？")) {
                favorites = [];
                localStorage.setItem('toeic_grammar_favs', JSON.stringify(favorites));
                updateFavCount();
                renderFavorites();
                updateCard();
            }
        }

        loadGrammar();
    </script>
</body>
</html>
